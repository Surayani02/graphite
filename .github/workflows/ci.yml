name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/engine

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fails on known advisories (high or critical) in production
      # dependencies. Dev-tooling advisories arrive as Dependabot PRs
      # instead of blocking CI; the sanctioned per-advisory override is
      # pnpm's auditConfig.ignoreCves (documented in ADR-022).
      - name: Audit dependencies (pnpm)
        run: pnpm audit --prod --audit-level=high

      - name: Build
        run: pnpm turbo run build

      # ADR-017's 175 kB gzip main-chunk ceiling, enforced (ADR-022) —
      # added after the ceiling was breached with a green pipeline.
      - name: Bundle size gate
        run: node scripts/check-bundle-size.mjs

      - name: Type check
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm turbo run test

      - name: Type check (E2E specs)
        run: pnpm --filter @graphite/web exec tsc --noEmit -p tsconfig.e2e.json

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-24.04
    needs: typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/engine

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The WASM engine (packages/engine/pkg) is a gitignored build artifact,
      # so it must be built before the web app that imports it. The webServer
      # command in playwright.config.ts only runs the web Vite build, which
      # would otherwise fail on the missing @graphite/engine import.
      - name: Build engine (WASM)
        run: pnpm --filter @graphite/engine run build

      - name: Install Playwright browsers
        run: pnpm --filter @graphite/web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @graphite/web exec playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  rust:
    name: Rust
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      # RustSec advisory database check across the whole Cargo workspace.
      - name: Security audit (RustSec)
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Check (native)
        run: cargo check --all-targets

      - name: Check (engine — WASM target)
        run: cargo check --target wasm32-unknown-unknown -p graphite-engine

      - name: Bench compile check
        run: cargo bench --no-run
